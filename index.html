<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>BMI Calculator</h2>

    <form method="POST">
        
        <!-- Weight -->
        <input type="number" step="0.1" name="weight" placeholder="Enter Weight" required>
        <select name="weight_unit">
            <option value="kg">Kilograms (kg)</option>
            <option value="lb">Pounds (lb)</option>
        </select>

        <!-- Height -->
        <input type="number" step="0.1" name="height" placeholder="Enter Height" required>
        <select name="height_unit">
            <option value="cm">Centimeters (cm)</option>
            <option value="m">Meters (m)</option>
            <option value="ft">Feet (ft)</option>
        </select>

        <button type="submit">Calculate BMI</button>
    </form>

    {% if bmi is not none %}
    <div class="result">
        <h3>Your BMI: {{ bmi }}</h3>
        <h4>{{ category }}</h4>
    </div>
    {% endif %}
</div>

</body>
</html>
